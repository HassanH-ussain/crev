# Render Blueprint — deploys the whole stack in one click:
# https://render.com/deploy?repo=https://github.com/HassanH-ussain/crev
#
# - crev-api-hassan: FastAPI backend (Docker, free tier)
# - crev-hassan:     React frontend (static site, free tier) with /api
#                    rewritten to the backend, so no CORS setup is needed
#
# The only manual input is ANTHROPIC_API_KEY (prompted during deploy).
# Note: free-tier services spin down when idle — the first request after
# a quiet period takes ~50s to cold-start.

services:
  - type: web
    name: crev-api-hassan
    runtime: docker
    rootDir: crev-web/backend
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false          # entered once in the Render dashboard, never in git

  - type: web
    name: crev-hassan
    runtime: static
    rootDir: crev-web/frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /api/*
        destination: https://crev-api-hassan.onrender.com/api/*
