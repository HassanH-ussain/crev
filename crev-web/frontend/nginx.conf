server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    # SPA fallback — client-side routing always lands on index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Fingerprinted assets are safe to cache forever
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Proxy API calls to the FastAPI container
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;   # AI reviews can take a while
        client_max_body_size 2m;   # backend enforces its own 500 KB code limit
    }
}
