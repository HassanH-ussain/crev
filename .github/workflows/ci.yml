name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend-tests:
    name: Backend tests (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crev-web/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: crev-web/backend/requirements-dev.txt
      - name: Install dependencies
        run: pip install -r requirements-dev.txt
      - name: Run test suite
        run: pytest -v

  frontend-build:
    name: Frontend build (Vite)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crev-web/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: crev-web/frontend/package-lock.json
      - name: Install dependencies
        run: npm ci --no-audit --no-fund
      - name: Build production bundle
        run: npm run build

  docker-build:
    name: Docker images build
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-build]
    steps:
      - uses: actions/checkout@v4
      - name: Build both images via compose
        run: docker compose -f crev-web/docker-compose.yml build
